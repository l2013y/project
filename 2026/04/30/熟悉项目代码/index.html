<!-- Table of Contents -->
<script type="text/javascript">
    function generateToc() {
        var tocContainer = $('#toc-container');
        var mobileTocContent = $('#mobileTocContent');
        var mobileTocBtn = $('#mobileTocBtn');

        // 如果不在文章页，直接返回
        if (!tocContainer.length && !mobileTocBtn.length) {
            return;
        }

        var headings = $('.article-content h1, .article-content h2, .article-content h3');

        // PC 端目录
        if (tocContainer.length) {
            if (headings.length === 0) {
                tocContainer.html('<div class="toc-placeholder">暂无目录</div>');
            } else {
                generateTocContent(tocContainer, headings, false);
            }
        }

        // 移动端目录：如果有标题才显示按钮
        if (mobileTocBtn.length) {
            if (headings.length === 0) {
                mobileTocBtn.removeClass('has-toc');
            } else {
                mobileTocBtn.addClass('has-toc');
                generateTocContent(mobileTocContent, headings, true);
            }
        }
    }

    function generateTocContent(container, headings, isMobile) {
        // Clear existing IDs to avoid duplicates
        headings.removeAttr('id');

        var tocHtml = '<ul>';
        headings.each(function(index) {
            var heading = $(this);
            var level = parseInt(heading.prop('tagName').charAt(1));
            var text = heading.text();
            var id = 'heading-' + index;

            heading.attr('id', id);
            tocHtml += '<li class="toc-level-' + level + '">';
            tocHtml += '<a href="#' + id + '">' + text + '</a>';
            tocHtml += '</li>';
        });
        tocHtml += '</ul>';

        container.html(tocHtml);

        // Smooth scroll
        container.find('a').off('click').on('click', function(e) {
            e.preventDefault();
            var target = $($(this).attr('href'));
            if (target.length) {
                $('html, body').animate({
                    scrollTop: target.offset().top - 80
                }, 300);
            }
            // 移动端：点击后关闭面板
            if (isMobile) {
                closeMobileToc();
            }
        });

        // Highlight active heading (only for PC)
        if (!isMobile) {
            function highlightToc() {
                var scrollPos = $(window).scrollTop() + 100;
                headings.each(function() {
                    var heading = $(this);
                    var link = container.find('a[href="#' + heading.attr('id') + '"]');

                    if (heading.offset().top <= scrollPos) {
                        container.find('a').removeClass('active');
                        link.addClass('active');
                    }
                });
            }
            $(window).off('scroll.toc').on('scroll.toc', highlightToc);
            highlightToc();
        }
    }

    // 移动端目录开关
    function openMobileToc() {
        $('#tocOverlay').addClass('show');
        $('#mobileTocPanel').addClass('show');
        $('body').css('overflow', 'hidden');
    }

    function closeMobileToc() {
        $('#tocOverlay').removeClass('show');
        $('#mobileTocPanel').removeClass('show');
        $('body').css('overflow', '');
    }

    $(function() {
        generateToc();

        // 移动端目录事件
        $('#mobileTocBtn').on('click', openMobileToc);
        $('#tocCloseBtn, #tocOverlay').on('click', closeMobileToc);

        // For encrypted posts: use polling since MutationObserver doesn't work well
        if ($('#hexo-blog-encrypt').length) {
            var tocPollCount = 0;
            var tocPollInterval = setInterval(function() {
                tocPollCount++;
                var hasHeadings = $('.article-content h2, .article-content h3').length > 0;

                if (hasHeadings) {
                    generateToc();
                    clearInterval(tocPollInterval);
                }

                if (tocPollCount > 30) { // Stop after 30 seconds
                    clearInterval(tocPollInterval);
                }
            }, 1000);

            // Also trigger when button is clicked
            $(document).on('click', '.hbe-button', function() {
                setTimeout(generateToc, 800);
                setTimeout(generateToc, 2000);
            });
        }
    });
</script>

<!-- Typing Animation -->
<script type="text/javascript">
    (function() {
        var typed = new Set();
        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (!entry.isIntersecting) return;
                var el = entry.target;
                if (typed.has(el)) return;
                typed.add(el);

                var text = el.getAttribute('data-text') || '';
                var target = el.querySelector('.typing-text');
                if (!target) return;
                target.textContent = '';

                var index = 0;
                var timer = setInterval(function() {
                    target.textContent += text.charAt(index);
                    index++;
                    if (index >= text.length) {
                        clearInterval(timer);
                    }
                }, 180);
            });
        }, { threshold: 0.3 });

        document.querySelectorAll('.typing-title').forEach(function(el) {
            observer.observe(el);
        });
    })();
</script>

<script type="text/javascript">
    (function() {
        function getGoTopBtn() {
            return document.getElementById('goTopBtn');
        }

        function toggleGoTopBtn() {
            var btn = getGoTopBtn();
            if (!btn) return;
            var scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            if (scrollTop > 300) {
                btn.classList.add('show');
            } else {
                btn.classList.remove('show');
            }
        }

        window.addEventListener('scroll', toggleGoTopBtn);
        document.addEventListener('touchend', toggleGoTopBtn);
        toggleGoTopBtn();

        document.addEventListener('click', function(e) {
            var btn = getGoTopBtn();
            if (btn && btn.contains(e.target)) {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            }
        });

        // 加密文章解锁后重新绑定
        document.addEventListener('click', function(e) {
            if (e.target.classList && e.target.classList.contains('hbe-button')) {
                setTimeout(toggleGoTopBtn, 1000);
                setTimeout(toggleGoTopBtn, 3000);
            }
        });
    })();
</script>
